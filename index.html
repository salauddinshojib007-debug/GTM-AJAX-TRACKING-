<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Correspondence — Contact</title>

  <!-- Google Fonts: Playfair Display + Cormorant Garamond -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />

  <!-- jQuery (MANDATORY — GTM jQuery AJAX listener depends on this) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <style>
    /* ── RESET & BASE ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ivory:        #fdfbf7;
      --ivory-mid:    #f5f0e8;
      --charcoal:     #1c1c1c;
      --navy:         #1a2340;
      --muted:        #7a7065;
      --rule:         #d4cec4;
      --gold:         #b09a72;
      --gold-light:   #c8b08a;
      --success-bg:   #f4f1eb;

      --ff-display: 'Playfair Display', Georgia, serif;
      --ff-body:    'Cormorant Garamond', 'Times New Roman', serif;
    }

    html, body {
      height: 100%;
      background-color: var(--ivory);
      color: var(--charcoal);
      font-family: var(--ff-body);
      font-size: 18px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PAGE LAYOUT ───────────────────────────────────────── */
    .page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle grain texture overlay */
    .page-wrapper::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Decorative corner ornaments */
    .corner {
      position: fixed;
      width: 80px;
      height: 80px;
      opacity: 0.18;
    }
    .corner--tl { top: 28px; left: 28px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--tr { top: 28px; right: 28px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner--bl { bottom: 28px; left: 28px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--br { bottom: 28px; right: 28px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    /* ── CARD ──────────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      background: var(--ivory);
      border: 1px solid var(--rule);
      padding: 56px 52px 52px;
    }

    /* Inner double-line frame */
    .card::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid var(--rule);
      pointer-events: none;
      opacity: 0.5;
    }

    /* ── HEADER ────────────────────────────────────────────── */
    .card__eyebrow {
      font-family: var(--ff-body);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 14px;
    }

    .card__title {
      font-family: var(--ff-display);
      font-size: 2rem;
      font-weight: 400;
      font-style: italic;
      color: var(--navy);
      text-align: center;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .card__rule {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 auto 28px;
      width: 80%;
    }
    .card__rule::before,
    .card__rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .card__rule-diamond {
      color: var(--gold);
      font-size: 10px;
      line-height: 1;
    }

    .card__subtitle {
      font-family: var(--ff-body);
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      margin-bottom: 38px;
      letter-spacing: 0.02em;
    }

    /* ── FORM FIELDS ───────────────────────────────────────── */
    .form-group {
      position: relative;
      margin-bottom: 32px;
    }

    .form-group label {
      display: block;
      font-family: var(--ff-body);
      font-size: 10.5px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--rule);
      border-radius: 0;
      padding: 6px 0 10px;
      font-family: var(--ff-body);
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--charcoal);
      outline: none;
      transition: border-color 0.3s ease;
      -webkit-appearance: none;
    }

    .form-group input::placeholder {
      color: #c2bbb0;
      font-style: italic;
      font-size: 0.95rem;
    }

    .form-group input:focus {
      border-bottom-color: var(--gold);
    }

    /* Animated underline on focus */
    .form-group::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-group:focus-within::after {
      width: 100%;
    }

    /* ── SUBMIT BUTTON ─────────────────────────────────────── */
    .btn-submit {
      display: block;
      width: 100%;
      margin-top: 40px;
      padding: 14px 0;
      background: transparent;
      border: 1px solid var(--charcoal);
      font-family: var(--ff-body);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--charcoal);
      cursor: pointer;
      transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease, letter-spacing 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--navy);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-submit span {
      position: relative;
      z-index: 1;
    }

    .btn-submit:hover::before {
      transform: translateY(0);
    }

    .btn-submit:hover {
      color: var(--ivory);
      border-color: var(--navy);
      letter-spacing: 0.32em;
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Loading dots on submit */
    .btn-submit.loading span::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* ── SUCCESS STATE ─────────────────────────────────────── */
    #success-message {
      display: none;
      text-align: center;
      padding: 12px 0;
    }

    .success-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 24px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--gold);
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Checkmark draw animation */
    .success-icon svg path {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
    }
    #success-message.visible .success-icon svg path {
      animation: draw-check 0.6s 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }

    .success-eyebrow {
      font-family: var(--ff-body);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .success-heading {
      font-family: var(--ff-display);
      font-size: 1.6rem;
      font-weight: 400;
      font-style: italic;
      color: var(--navy);
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .success-body {
      font-family: var(--ff-body);
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.8;
      max-width: 340px;
      margin: 0 auto;
    }

    /* ── GTM DEBUG PANEL ───────────────────────────────────── */
    #debug-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #0d1117;
      border-top: 1px solid #2a2f3a;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #8b949e;
      max-height: 190px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    #debug-panel.collapsed { max-height: 36px; }

    #debug-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid #2a2f3a;
    }

    #debug-toggle .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #7ee787;
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    #debug-toggle .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #7ee787;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #debug-toggle .arrow {
      color: #8b949e;
      transition: transform 0.25s ease;
      font-size: 10px;
    }
    #debug-panel:not(.collapsed) #debug-toggle .arrow { transform: rotate(180deg); }

    #debug-log {
      padding: 10px 16px 12px;
      overflow-y: auto;
      max-height: 145px;
    }

    .debug-entry {
      display: flex;
      gap: 12px;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .debug-entry .ts { color: #3d8bcd; flex-shrink: 0; }
    .debug-entry .label { color: #f0883e; flex-shrink: 0; }
    .debug-entry .payload { color: #7ee787; word-break: break-all; }
    .debug-entry .event { color: #d2a8ff; }
    .debug-entry .dim { color: #484f58; }

    /* ── FOOTER MONOGRAM ───────────────────────────────────── */
    .footer-monogram {
      position: relative;
      z-index: 1;
      margin-top: 36px;
      text-align: center;
      font-family: var(--ff-display);
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--rule);
      font-style: italic;
    }

    /* ── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 560px) {
      .card { padding: 40px 28px 36px; }
      .corner { width: 50px; height: 50px; }
    }
  </style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PCJNKKXQ"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<!-- Corner ornaments -->
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="page-wrapper">

  <div class="card">

    <!-- ── FORM VIEW ──────────────────────────────────── -->
    <div id="form-container">
      <p class="card__eyebrow">Correspondence</p>
      <h1 class="card__title">Get in Touch</h1>
      <div class="card__rule"><span class="card__rule-diamond">◆</span></div>
      <p class="card__subtitle">We endeavour to respond within one business day.</p>

      <form id="contact-form" novalidate>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Your name, please"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Electronic Post</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="your@address.com"
            autocomplete="email"
            required
          />
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <span>Send Correspondence</span>
        </button>

      </form>
    </div><!-- /#form-container -->

    <!-- ── SUCCESS VIEW ───────────────────────────────── -->
    <div id="success-message">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4.5 12.75l6 6 9-13.5"/>
        </svg>
      </div>
      <p class="success-eyebrow">Message Received</p>
      <h2 class="success-heading">Most Appreciated</h2>
      <p class="success-body" id="success-text"></p>
    </div><!-- /#success-message -->

  </div><!-- /.card -->

  <p class="footer-monogram">Est. MMXXV &nbsp;·&nbsp; Fine Correspondence</p>

</div><!-- /.page-wrapper -->


<!-- ══════════════════════════════════════════════════════════════
     GTM DEBUG PANEL — visualises every dataLayer.push() in real time
══════════════════════════════════════════════════════════════ -->
<div id="debug-panel" class="collapsed">
  <div id="debug-toggle">
    <span class="badge">GTM dataLayer Monitor</span>
    <span class="arrow">▲</span>
  </div>
  <div id="debug-log">
    <div class="debug-entry dim">
      <span class="ts">&mdash;</span>
      <span>Waiting for dataLayer events&hellip;</span>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════════════
     APPLICATION SCRIPT
══════════════════════════════════════════════════════════════ -->
<script>
$(function () {

  /* ─────────────────────────────────────────────────────────────
     1.  DEBUG PANEL WIRING
         Wraps dataLayer.push so every push appears in the console.
  ───────────────────────────────────────────────────────────── */
  (function monkeyPatchDataLayer() {
    var originalPush = Array.prototype.push;

    // Intercept pushes on THE dataLayer array instance
    Object.defineProperty(window, 'dataLayer', {
      configurable: true,
      get: function () { return window._dlInternal; },
      set: function (arr) {
        window._dlInternal = arr;
        window._dlInternal.push = function () {
          var result = originalPush.apply(this, arguments);
          for (var i = 0; i < arguments.length; i++) {
            logToDebugPanel(arguments[i]);
          }
          return result;
        };
      }
    });

    // Re-assign to trigger the setter on the already-existing array
    window.dataLayer = window.dataLayer || [];
  })();

  function logToDebugPanel(payload) {
    var now      = new Date();
    var ts       = now.toTimeString().slice(0, 8) + '.' +
                   String(now.getMilliseconds()).padStart(3, '0');
    var eventStr = payload.event ? payload.event : '(no event)';
    var jsonStr  = JSON.stringify(payload, null, 0);

    var $entry = $('<div class="debug-entry">')
      .append($('<span class="ts">').text(ts))
      .append($('<span class="label">').text('event:'))
      .append($('<span class="event">').text(eventStr + ' '))
      .append($('<span class="payload">').text(jsonStr));

    var $log = $('#debug-log');
    // Remove the placeholder dim entry if present
    $log.find('.dim').remove();
    $log.append($entry);
    $log.scrollTop($log[0].scrollHeight);

    // Auto-expand panel when a new event fires
    $('#debug-panel').removeClass('collapsed');
  }

  // Toggle panel collapse
  $('#debug-toggle').on('click', function () {
    $('#debug-panel').toggleClass('collapsed');
  });


  /* ─────────────────────────────────────────────────────────────
     2.  MOCK AJAX TRANSPORT
         Intercepts ANY $.ajax call to '/api/submit' and returns a
         simulated 200 + the exact JSON payload required by the spec.
         No live server needed.
  ───────────────────────────────────────────────────────────── */
  $.ajaxTransport('+*', function (options) {
    if (options.url !== '/api/submit') return; // Only intercept our endpoint

    return {
      send: function (headers, completeCallback) {
        // Simulate network latency (800 ms)
        window._mockXhrTimer = setTimeout(function () {
          var mockResponse = {
            status:  'success',
            data: {
              message: 'Thanks for contacting us! We will be in touch with you shortly'
            }
          };
          completeCallback(
            200,                           // HTTP status code
            'OK',                          // status text
            { json: mockResponse },        // responses object (jQuery reads .json)
            'Content-Type: application/json'
          );
        }, 800);
      },
      abort: function () {
        clearTimeout(window._mockXhrTimer);
      }
    };
  });


  /* ─────────────────────────────────────────────────────────────
     3.  FORM SUBMISSION HANDLER
  ───────────────────────────────────────────────────────────── */
  $('#contact-form').on('submit', function (e) {
    e.preventDefault(); // Prevent default page reload

    var name  = $.trim($('#name').val());
    var email = $.trim($('#email').val());

    // Minimal client-side guard
    if (!name || !email) {
      // Shake the empty fields
      ['#name', '#email'].forEach(function (sel) {
        if (!$.trim($(sel).val())) {
          $(sel).css({ animation: 'none' }).offset(); // reflow
          $(sel).css({
            animation: 'shake 0.4s ease',
            borderBottomColor: '#c0392b'
          });
          setTimeout(function () {
            $(sel).css({ borderBottomColor: '', animation: '' });
          }, 1200);
        }
      });
      return;
    }

    // Disable button + show loading state
    var $btn = $('#submit-btn');
    $btn.prop('disabled', true).addClass('loading');
    $btn.find('span').text('Sending');

    /* ── PUSH: form_submit_attempt ────────────────────────── */
    window.dataLayer.push({
      event:      'form_submit_attempt',
      form_id:    'contact_form',
      form_name:  'Contact Form',
      user_name:  name,
      user_email: email
    });

    /* ── ACTUAL AJAX CALL (intercepted by mock transport) ─── */
    $.ajax({
      url:         '/api/submit',
      type:        'POST',
      contentType: 'application/json',
      dataType:    'json',
      data:        JSON.stringify({ name: name, email: email })
    })
    .done(function (responseJSON, textStatus, jqXHR) {
      /*
       * responseJSON now EXACTLY matches the spec:
       * {
       *   "status": "success",
       *   "data": {
       *     "message": "Thanks for contacting us! We will be in touch with you shortly"
       *   }
       * }
       *
       * Your GTM Data Layer Variable path: responseJSON.data.message
       */

      if (responseJSON.status === 'success') {

        /* ── PUSH: form_submit_success ─────────────────────── */
        window.dataLayer.push({
          event:           'form_submit_success',
          form_id:         'contact_form',
          form_name:       'Contact Form',
          submission_status: responseJSON.status,                   // "success"
          confirmation_message: responseJSON.data.message,          // full message string
          response_data:   responseJSON.data                        // nested object
        });

        /* ── DOM: fade out form, fade in success ───────────── */
        $('#form-container').fadeOut(400, function () {

          // Populate the success message text from the JSON payload
          $('#success-text').text(responseJSON.data.message);

          $('#success-message')
            .fadeIn(500)
            .addClass('visible'); // triggers CSS checkmark draw animation
        });

      } else {
        // Non-success status in JSON body
        handleError('Unexpected response status: ' + responseJSON.status);
      }
    })
    .fail(function (jqXHR, textStatus, errorThrown) {
      handleError(textStatus + ': ' + errorThrown);
    })
    .always(function () {
      $btn.prop('disabled', false).removeClass('loading');
      $btn.find('span').text('Send Correspondence');
    });
  });


  /* ─────────────────────────────────────────────────────────────
     4.  ERROR HANDLER
  ───────────────────────────────────────────────────────────── */
  function handleError(msg) {
    /* ── PUSH: form_submit_error ──────────────────────────── */
    window.dataLayer.push({
      event:         'form_submit_error',
      form_id:       'contact_form',
      form_name:     'Contact Form',
      error_message: msg
    });

    console.error('[Contact Form] Submission error:', msg);
  }

  /* ─────────────────────────────────────────────────────────────
     5.  SHAKE KEYFRAME (injected programmatically to keep CSS clean)
  ───────────────────────────────────────────────────────────── */
  $('<style>')
    .text('@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }')
    .appendTo('head');

});
</script>

</body>
</html>
